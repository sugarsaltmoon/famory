<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>あしあとカレンダー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; background-color: #fdfcf0; color: #4a4a4a; }
        .beige-bg { background-color: #fdfcf0; }
        .ivory-bg { background-color: #fffbeb; }
        .tan-bg { background-color: #f5f5dc; }
        .btn-large { padding: 16px 24px; font-size: 1.25rem; font-weight: bold; border-radius: 16px; transition: all 0.2s; }
        .btn-large:active { transform: scale(0.95); }
        .card { background-color: white; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .tab-active { border-bottom: 4px solid #d2b48c; color: #d2b48c; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(253, 252, 240, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin: 1px; }
        .dot-all { background-color: #3b82f6; } /* 青: 全員 */
        .dot-paternal { background-color: #ef4444; } /* 赤: 大塚家 */
        .dot-maternal { background-color: #10b981; } /* 緑: 石川家 */
    </style>
</head>
<body class="min-h-screen">

    <div id="loading-overlay">
        <div class="text-xl font-bold text-tan-800 animate-pulse">読み込み中...</div>
    </div>

    <!-- Header -->
    <header class="bg-white px-4 py-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-2">
                👣 <span class="text-[#8b4513]">あしあとカレンダー</span>
            </h1>
            <button onclick="toggleSearch()" class="p-2 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Nav Tabs -->
    <nav class="bg-white border-b sticky top-[68px] z-40">
        <div class="max-w-4xl mx-auto flex">
            <button id="tab-calendar" onclick="switchView('calendar')" class="flex-1 py-4 text-lg font-bold text-center tab-active">カレンダー</button>
            <button id="tab-timeline" onclick="switchView('timeline')" class="flex-1 py-4 text-lg font-bold text-center text-slate-400">タイムライン</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-4 pb-24">
        
        <!-- Search Area (Hidden) -->
        <div id="search-area" class="hidden mb-6">
            <input type="text" id="search-input" onkeyup="filterData()" placeholder="キーワードで検索" class="w-full p-4 border-2 border-tan-200 rounded-2xl text-lg focus:outline-none focus:border-tan-400">
        </div>

        <!-- Calendar View -->
        <div id="view-calendar" class="space-y-4">
            <div id="calendar-header" class="flex items-center justify-between mb-2">
                <button onclick="changeMonth(-1)" class="p-4 text-2xl font-bold">〈</button>
                <div id="current-month" class="text-2xl font-bold">読み込み中...</div>
                <button onclick="changeMonth(1)" class="p-4 text-2xl font-bold">〉</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-slate-400 mb-2">
                <div class="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-400">土</div>
            </div>
            <div id="calendar-body" class="grid grid-cols-7 gap-1 bg-white p-2 rounded-2xl shadow-sm min-h-[400px]">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Timeline View -->
        <div id="view-timeline" class="hidden space-y-6">
            <div id="timeline-container" class="space-y-4">
                <!-- Data cards here -->
            </div>
        </div>

    </main>

    <!-- Add Button (Admin only) -->
    <div id="admin-only" class="fixed bottom-6 right-6 z-50 hidden">
        <button onclick="openForm()" class="bg-[#d2b48c] text-white w-16 h-16 rounded-full shadow-xl flex items-center justify-center text-4xl font-bold">
            ＋
        </button>
    </div>

    <!-- Modal -->
    <div id="form-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-[#fdfcf0] w-full max-w-lg rounded-3xl p-6 shadow-2xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-bold">足あとの登録</h3>
                <button onclick="closeForm()" class="text-slate-400 text-2xl">✕</button>
            </div>
            <form id="event-form" onsubmit="handleSave(event)" class="space-y-4">
                <input type="date" id="f-date" required class="w-full p-4 border-2 border-tan-100 rounded-xl text-lg">
                <input type="text" id="f-title" placeholder="イベント名" required class="w-full p-4 border-2 border-tan-100 rounded-xl text-lg">
                <textarea id="f-detail" placeholder="詳細（メモ）" class="w-full p-4 border-2 border-tan-100 rounded-xl text-lg h-32"></textarea>
                <input type="text" id="f-location" placeholder="場所（店名・住所など）" class="w-full p-4 border-2 border-tan-100 rounded-xl text-lg">
                
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2">共有範囲</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" onclick="setRange('全員')" id="r-all" class="range-btn p-3 rounded-xl border-2 border-blue-200 text-blue-500 font-bold bg-blue-50">全員</button>
                        <button type="button" onclick="setRange('大塚家')" id="r-paternal" class="range-btn p-3 rounded-xl border-2 border-slate-200 text-slate-400 font-bold">大塚家</button>
                        <button type="button" onclick="setRange('石川家')" id="r-maternal" class="range-btn p-3 rounded-xl border-2 border-slate-200 text-slate-400 font-bold">石川家</button>
                    </div>
                    <input type="hidden" id="f-range" value="全員">
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeForm()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-lg">取消</button>
                    <button type="submit" class="flex-1 p-4 bg-[#d2b48c] text-white rounded-2xl font-bold text-lg shadow-lg">保存する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // --- 設定エリア ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbwlFjHsYDYUyx_irB15Mge0XLgWpuFNARgJbP0a2vjLMCrCcZCpjUjfAQHu3B6oTyBHUw/exec';
        
        const params = new URLSearchParams(window.location.search);
        const ROLE = (params.get('role') || 'guest').toLowerCase();
        console.log('Detected Role:', ROLE);

        let currentMonth = new Date();
        let allEvents = [];

        window.onload = function() {
            console.log('Detected Role:', ROLE);
            if (ROLE === 'admin') {
                const btn = document.getElementById('admin-only');
                if (btn) {
                    btn.classList.remove('hidden');
                    btn.style.display = 'block'; // 強制的に表示
                    console.log('Admin button shown');
                } else {
                    console.error('Admin button element not found');
                }
            }
            loadData();
        };

        function setWait(b) {
            document.getElementById('loading-overlay').style.display = b ? 'flex' : 'none';
        }

        async function loadData() {
            setWait(true);
            try {
                const response = await fetch(`${API_URL}?action=getEvents&role=${ROLE}`);
                const data = await response.json();
                if (data.error) {
                    alert('サーバーエラー:\n' + data.error);
                } else {
                    allEvents = data;
                    renderView();
                }
            } catch (err) {
                console.error('通信エラー:', err);
                alert('通信に失敗しました。以前の指示に従って、GASのデプロイ設定（アクセス：全員）が正しく行われているか、またはWebアプリURLが正しいか確認してください。\n\nエラー内容: ' + err.message);
            }
            setWait(false);
        }

        function switchView(view) {
            document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
            document.getElementById('view-timeline').classList.toggle('hidden', view !== 'timeline');
            document.getElementById('tab-calendar').classList.toggle('tab-active', view === 'calendar');
            document.getElementById('tab-calendar').classList.toggle('text-slate-400', view !== 'calendar');
            document.getElementById('tab-timeline').classList.toggle('tab-active', view === 'timeline');
            document.getElementById('tab-timeline').classList.toggle('text-slate-400', view !== 'timeline');
            renderView();
        }

        function renderView() {
            const isCalendar = !document.getElementById('view-calendar').classList.contains('hidden');
            if (isCalendar) renderCalendar();
            else renderTimeline();
        }

        // --- Calendar Logic ---
        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            const monthText = document.getElementById('current-month');
            body.innerHTML = '';
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            monthText.innerText = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) body.innerHTML += '<div class="h-16 border-b border-r bg-slate-50/50"></div>';

            for(let d=1; d<=lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dailyEvents = allEvents.filter(e => e.日付 === dateStr);
                
                let dotsHtml = '';
                dailyEvents.forEach(e => {
                    let dotClass = 'dot-all';
                    if(e.共有範囲 === '大塚家') dotClass = 'dot-paternal';
                    else if(e.共有範囲 === '石川家') dotClass = 'dot-maternal';
                    dotsHtml += `<span class="dot ${dotClass}"></span>`;
                });

                const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
                body.innerHTML += `
                    <div class="h-16 border-b border-r p-1 text-sm font-bold flex flex-col items-center">
                        <span class="${isToday ? 'bg-[#d2b48c] text-white rounded-full w-6 h-6 flex items-center justify-center' : ''}">${d}</span>
                        <div class="flex flex-wrap justify-center gap-px">${dotsHtml}</div>
                    </div>
                `;
            }
        }

        function changeMonth(n) {
            currentMonth.setMonth(currentMonth.getMonth() + n);
            renderCalendar();
        }

        // --- Timeline Logic ---
        function renderTimeline(list = allEvents) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-slate-400">予定がありません</div>';
                return;
            }

            list.forEach(e => {
                const rangeLabel = e.共有範囲 === '全員' ? '🏠 全員' : (e.共有範囲 === '大塚家' ? '🔴 大塚家' : '🟢 石川家');
                const rangeCol = e.共有範囲 === '全員' ? 'text-blue-500 bg-blue-50' : (e.共有範囲 === '大塚家' ? 'text-red-500 bg-red-50' : 'text-emerald-500 bg-emerald-50');

                container.innerHTML += `
                    <div class="card p-4 space-y-3">
                        <div class="flex justify-between items-start">
                            <span class="text-sm font-bold px-2 py-1 rounded-md ${rangeCol}">${rangeLabel}</span>
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-slate-400 font-bold">${e.日付}</span>
                                ${ROLE === 'admin' ? `<button onclick="handleDelete('${e.ID}')" class="text-slate-300 hover:text-red-400 p-1">✕</button>` : ''}
                            </div>
                        </div>
                        <h3 class="text-xl font-bold">${e.タイトル}</h3>
                        ${e.詳細 ? `<p class="text-slate-600 leading-relaxed whitespace-pre-wrap">${e.詳細}</p>` : ''}
                        ${e.場所 ? `
                            <button onclick="openMap('${e.場所}')" class="text-blue-600 bg-blue-50 px-3 py-2 rounded-lg flex items-center gap-1 text-sm font-bold">
                                📍 ${e.場所}
                            </button>
                        ` : ''}
                        <div class="flex gap-2 pt-2">
                             ${e.pCloudURL ? `<a href="${e.pCloudURL}" target="_blank" class="flex-1 bg-[#f5f5dc] p-3 rounded-xl text-center text-sm font-bold">📷 写真</a>` : ''}
                             ${e.資料URL ? `<a href="${e.資料URL}" target="_blank" class="flex-1 bg-[#f5f5dc] p-3 rounded-xl text-center text-sm font-bold">📄 資料</a>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function openMap(loc) {
            window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(loc), '_blank');
        }

        function toggleSearch() {
            const area = document.getElementById('search-area');
            area.classList.toggle('hidden');
            if(!area.classList.contains('hidden')) document.getElementById('search-input').focus();
        }

        function filterData() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allEvents.filter(e => 
                e.タイトル.toLowerCase().includes(q) || 
                (e.詳細 && e.詳細.toLowerCase().includes(q)) ||
                (e.場所 && e.場所.toLowerCase().includes(q))
            );
            renderTimeline(filtered);
            if(document.getElementById('view-timeline').classList.contains('hidden')) switchView('timeline');
        }

        // --- Form Interaction ---
        function openForm() {
            document.getElementById('form-modal').classList.remove('hidden');
            document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
        }

        function closeForm() {
            document.getElementById('form-modal').classList.add('hidden');
            document.getElementById('event-form').reset();
            setRange('全員');
        }

        function setRange(val) {
            document.getElementById('f-range').value = val;
            const ids = { '全員': 'r-all', '大塚家': 'r-paternal', '石川家': 'r-maternal' };
            const cols = { '全員': 'border-blue-200 text-blue-500 bg-blue-50', '大塚家': 'border-red-200 text-red-500 bg-red-50', '石川家': 'border-emerald-200 text-emerald-500 bg-emerald-50' };
            
            Object.keys(ids).forEach(k => {
                const btn = document.getElementById(ids[k]);
                if(k === val) btn.className = 'p-3 rounded-xl border-2 font-bold ' + cols[k];
                else btn.className = 'p-3 rounded-xl border-2 border-slate-200 text-slate-400 font-bold';
            });
        }

        async function handleSave(e) {
            e.preventDefault();
            setWait(true);
            const data = {
                action: 'addEvent',
                role: ROLE,
                date: document.getElementById('f-date').value,
                title: document.getElementById('f-title').value,
                detail: document.getElementById('f-detail').value,
                location: document.getElementById('f-location').value,
                range: document.getElementById('f-range').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.success) {
                    closeForm();
                    loadData();
                } else {
                    alert('保存に失敗しました: ' + result.error);
                }
            } catch (err) {
                alert('通信エラーが発生しました');
            }
            setWait(false);
        }

        async function handleDelete(id) {
            if(!confirm('このイベントを削除しますか？')) return;
            setWait(true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deleteEvent', id: id, role: ROLE })
                });
                const result = await res.json();
                if(result.success) loadData();
                else alert('削除に失敗しました: ' + result.error);
            } catch (err) {
                alert('通信エラーが発生しました');
            }
            setWait(false);
        }
    </script>
</body>
</html>
